{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
    <h2 class="text-2xl font-bold mb-6">Registro de Huésped</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold mt-4 hover:bg-slate-800">
            Completar Registro
        </button>
    </form>
</div>
{% endblock %}
