{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 max-w-md w-full">
        <h2 class="text-2xl font-bold mb-6 text-center">Iniciar Sesión</h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-4 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-400{% else %}bg-blue-100 text-blue-700 border border-blue-400{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% if form.errors %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4">
                <strong>Error:</strong> Usuario o contraseña incorrectos.
            </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block font-bold mb-1">Nombre de Usuario</label>
                <input type="text" name="username" class="w-full p-2 border rounded-lg bg-slate-50" required>
            </div>
            <div class="mb-6">
                <label class="block font-bold mb-1">Contraseña</label>
                <input type="password" name="password" class="w-full p-2 border rounded-lg bg-slate-50" required>
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition">
                Iniciar Sesión
            </button>
        </form>
        
        <div class="mt-4 text-center text-sm text-slate-500">
            ¿No tienes una cuenta? 
            <a href="{% url 'home' %}" class="text-slate-900 font-bold hover:underline">Regístrate aquí</a>
        </div>
    </div>
</div>
{% endblock %}
