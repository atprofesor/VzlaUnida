<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VzlaUnida</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <nav class="bg-white border-b p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="text-center font-bold text-xl">
                <a href="{% url 'home' %}" class="text-slate-900 hover:text-slate-700">VzlaUnida</a>
            </div>
            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                    <span class="text-sm text-slate-600">Hola, {{ user.username }}</span>
                    <form method="post" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-sm bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition">
                            Cerrar Sesión
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-sm bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-slate-800 transition">
                        Iniciar Sesión
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto p-6">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
