<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VzlaUnida - S.O.S. Reubicación de Familias</title>
    
    <!-- ✅ Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- ✅ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ✅ Sistema de Diseño Personalizado -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    
    <style>
        /* ✅ Estilos del banner de la bandera */
        .flag-banner {
            background: linear-gradient(90deg, #FFD100 0%, #FFD100 33%, #001F5C 33%, #001F5C 66%, #CF202F 66%, #CF202F 100%);
            padding: 6px 0;
            position: relative;
            overflow: hidden;
        }
        .flag-banner::after {
            content: '✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.10);
            font-size: 8px;
            letter-spacing: 4px;
            white-space: nowrap;
            animation: scrollStars 30s linear infinite;
            pointer-events: none;
        }
        @keyframes scrollStars {
            0% { transform: translateY(-50%) translateX(0); }
            100% { transform: translateY(-50%) translateX(-50%); }
        }
        
        /* ✅ Logo y navegación */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: #001F5C;
            border: 3px solid #FFD100;
            box-shadow: 0 2px 12px rgba(0,31,92,0.15);
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .logo-circle:hover {
            transform: scale(1.05);
        }
        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }
        .logo-text .title {
            font-size: 1.35rem;
            font-weight: 800;
            color: #001F5C;
            letter-spacing: -0.5px;
        }
        .logo-text .subtitle {
            font-size: 0.6rem;
            font-weight: 600;
            color: #6B7280;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        /* ✅ Efecto hover en tarjetas de home */
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .card-hover .card-hover-content {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover .card-hover-reveal {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            padding: 12px 20px;
            background: rgba(0,0,0,0.85);
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            backdrop-filter: blur(4px);
        }
        .card-hover:hover .card-hover-reveal {
            bottom: 0;
            opacity: 1;
        }
        .card-hover:hover .card-hover-content {
            transform: translateY(-8px);
        }
        
        /* ✅ Ajustes responsive */
        @media (max-width: 640px) {
            .logo-circle {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            .logo-text .title {
                font-size: 1.1rem;
            }
            .logo-text .subtitle {
                font-size: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- ✅ BANNER DE LA BANDERA (ARRIBA) -->
    <div class="flag-banner"></div>

    <!-- ✅ BARRA DE NAVEGACIÓN CON LOGO -->
    <nav class="bg-white border-b border-gray-200 shadow-sm" style="position:sticky;top:0;z-index:100;">
        <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center">
            <!-- Logo y nombre -->
            <a href="{% url 'home' %}" class="logo-container group">
                <div class="logo-circle">V</div>
                <div class="logo-text">
                    <span class="title group-hover:text-primary-dark transition-colors">VzlaUnida</span>
                    <span class="subtitle">S.O.S. - Reubicación de Familias</span>
                </div>
            </a>
            
            <!-- Acciones de usuario -->
            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                    <span class="text-sm font-medium text-gray-600 hidden sm:inline">
                        <span class="text-gray-400">Hola,</span> 
                        <span class="text-primary font-bold">{{ user.username }}</span>
                    </span>
                    <form method="post" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-danger">
                            Cerrar Sesión
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-primary btn-sm">
                        Iniciar Sesión
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- ✅ CONTENIDO PRINCIPAL -->
    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
